version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: widgetlab
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: widgetlab_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: bash -c "bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: db
      POSTGRES_USER: widgetlab
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: widgetlab_development
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle_cache:
