services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0.22
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_broker_data:/mosquitto/data:rw
      - mqtt_broker_log:/mosquitto/log:rw
    restart: unless-stopped
  postgres:
    image: postgres:18.1-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
  postgres-keycloak:
    image: postgres:18.1-alpine
    container_name: postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME_STRICT_BACKCHANNEL: 'false'
      KC_PROXY_HEADERS: 'xforwarded'
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql
    networks:
      - default
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres-keycloak
    networks:
      - default
# volumes for mapping data,config and log
volumes:
  mqtt_broker_data:
  mqtt_broker_log:
  postgres-data:
  postgres-keycloak-data: